<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Employee Management Portal logo">
  <defs>
    <linearGradient id="emBadge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a2a4a"/>
      <stop offset="1" stop-color="#1a1a2e"/>
    </linearGradient>
  </defs>

  <!-- Rounded badge -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#emBadge)"/>

  <!-- Accent ring -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="none" stroke="#2a93a8" stroke-width="2" opacity="0.9"/>

  <!-- Center person head -->
  <circle cx="32" cy="24" r="7" fill="#ffffff"/>
  <!-- Center person shoulders -->
  <path d="M20 44c0-7 5.4-12 12-12s12 5 12 12z" fill="#ffffff"/>

  <!-- Left team member -->
  <circle cx="15" cy="30" r="4.5" fill="#2a93a8"/>
  <path d="M7 45c0-4.5 3.6-8 8-8s8 3.5 8 8z" fill="#2a93a8"/>

  <!-- Right team member -->
  <circle cx="49" cy="30" r="4.5" fill="#2a93a8"/>
  <path d="M41 45c0-4.5 3.6-8 8-8s8 3.5 8 8z" fill="#2a93a8"/>
</svg>
